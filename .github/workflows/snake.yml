name: Generate README Stats Cards

on:
  schedule:
    - cron: "0 3 * * *"   # once a day
  workflow_dispatch:        # allow manual trigger from the Actions tab
  push:
    branches:
      - main
    paths:
      - ".github/workflows/readme-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pinned repo card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Detecting-And-Highlighting-Terminals-On-Digital-Templates-Using-Artificial-Intelligence&theme=tokyonight&hide_border=true
          path: profile/pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push
